name: Build & Release APK

# ─────────────────────────────────────────────────────────────────────────────
# Triggers: push to master (automatic) OR manual run with optional tag name.
# No signing keys required — releases unsigned APK by default.
# To enable signed builds: add KEYSTORE_BASE64, KEYSTORE_PASSWORD,
#   KEY_ALIAS, KEY_PASSWORD in repo Settings → Secrets and variables → Actions.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Custom release tag (optional, e.g. v1.2.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK → GitHub Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle permission ──────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Build Debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── 5. Build Release APK ──────────────────────────────────────────────
      #   Signed  → when keystore secrets are configured in repo settings
      #   Unsigned → fallback (still installable via sideload / adb)
      #
      #   NOTE: secrets context is NOT allowed directly in if: expressions —
      #   GitHub blocks it at parse time. We resolve it via a run step first.
      - name: Check keystore availability
        id: keystore_check
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore (signed build)
        if: steps.keystore_check.outputs.has_keystore == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.jks

      - name: Build Release APK (signed)
        if: steps.keystore_check.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build Release APK (unsigned fallback)
        if: steps.keystore_check.outputs.has_keystore == 'false'
        run: ./gradlew assembleRelease --no-daemon

      # ── 6. Extract version & rename APKs ─────────────────────────────────
      - name: Extract version & rename APKs
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          DEBUG_SRC=$(find app/build/outputs/apk/debug   -name "*.apk" | head -1)
          RELEASE_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          DEBUG_DST="ZeroClaw-v${VERSION}-debug.apk"
          RELEASE_DST="ZeroClaw-v${VERSION}-release.apk"

          cp "$DEBUG_SRC"   "$DEBUG_DST"
          cp "$RELEASE_SRC" "$RELEASE_DST"

          echo "debug_apk=$DEBUG_DST"     >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_DST" >> $GITHUB_OUTPUT

          # Signing status label (shown in release notes)
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "sign_status=✅ Signed release" >> $GITHUB_OUTPUT
          else
            echo "sign_status=⚠️ Unsigned release (sideload only — add keystore secrets to sign)" >> $GITHUB_OUTPUT
          fi

      # ── 7. Upload workflow artifacts (90-day retention) ──────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroClaw-debug-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.debug_apk }}
          retention-days: 90

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroClaw-release-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.release_apk }}
          retention-days: 90

      # ── 8. Create Git tag ─────────────────────────────────────────────────
      - name: Create release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            TAG="${{ github.event.inputs.release_name }}"
          else
            TAG="v${{ steps.version.outputs.version }}-build.${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" || echo "Tag already exists, skipping"
          git push origin "$TAG" || echo "Tag push skipped"

      # ── 9. GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeroClaw ${{ steps.tag.outputs.tag }}"
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          generate_release_notes: true
          body: |
            ## ZeroClaw Android — ${{ steps.tag.outputs.tag }}

            ${{ steps.version.outputs.sign_status }}

            ### 📲 Install (sideload)
            1. Download **`ZeroClaw-v${{ steps.version.outputs.version }}-release.apk`** below
            2. On your Android device: **Settings → Security → Install unknown apps** → enable for your browser/file manager
            3. Open the downloaded APK and tap **Install**

            ### 🔨 Build info
            | Field | Value |
            |-------|-------|
            | Version | `${{ steps.version.outputs.version }}` |
            | Build # | `${{ github.run_number }}` |
            | Commit | `${{ github.sha }}` |
            | Branch | `master` |

            > **Debug APK** also attached — has `.debug` app-id suffix, can be installed alongside release.

            ---
            ### 🚀 Play Store
            _Play Store distribution is not yet configured. To set it up:_
            _add `PLAY_SERVICE_ACCOUNT_JSON` secret and enable the upload step in `.github/workflows/build-and-release.yml`_
          files: |
            ${{ steps.version.outputs.debug_apk }}
            ${{ steps.version.outputs.release_apk }}

      # ── 10. Play Store upload (DISABLED — configure to enable) ───────────
      # To enable:
      #   1. Create a Google Play service account → download the JSON key
      #   2. Add repo secret: PLAY_SERVICE_ACCOUNT_JSON = (contents of JSON key)
      #   3. Uncomment the step below and set your packageName
      #
      # - name: Upload to Play Store (Internal Testing)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: ai.zeroclaw.android
      #     releaseFiles: ${{ steps.version.outputs.release_apk }}
      #     track: internal          # internal | alpha | beta | production
      #     status: draft            # draft | completed
      #     releaseName: ZeroClaw ${{ steps.tag.outputs.tag }}
