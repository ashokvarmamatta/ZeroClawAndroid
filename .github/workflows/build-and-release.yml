name: Build & Release APK

# ─────────────────────────────────────────────────────────────────────────────
# Triggers: push to master (automatic) OR manual run with optional tag name.
# No signing keys required — releases unsigned APK by default.
# To enable signed builds: add KEYSTORE_BASE64, KEYSTORE_PASSWORD,
#   KEY_ALIAS, KEY_PASSWORD in repo Settings → Secrets and variables → Actions.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Custom release tag (optional, e.g. v1.2.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK → GitHub Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      #   fetch-depth: 0 + fetch-tags: true so the changelog step (6b) can see
      #   the previous v* tag and emit a proper "What's new since vX" section.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle permission ──────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Build Debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── 5. Build Release APK ──────────────────────────────────────────────
      #   Signed  → when keystore secrets are configured in repo settings
      #   Unsigned → fallback (still installable via sideload / adb)
      #
      #   NOTE: secrets context is NOT allowed directly in if: expressions —
      #   GitHub blocks it at parse time. We resolve it via a run step first.
      - name: Check keystore availability
        id: keystore_check
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore (signed build)
        if: steps.keystore_check.outputs.has_keystore == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.jks

      - name: Build Release APK (signed)
        if: steps.keystore_check.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build Release APK (unsigned fallback)
        if: steps.keystore_check.outputs.has_keystore == 'false'
        run: ./gradlew assembleRelease --no-daemon

      # ── 6. Extract version, rename APKs, compute size + SHA-256 ─────────
      - name: Extract version & rename APKs
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          DEBUG_SRC=$(find app/build/outputs/apk/debug   -name "*.apk" | head -1)
          RELEASE_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          DEBUG_DST="ZeroClaw-v${VERSION}-debug.apk"
          RELEASE_DST="ZeroClaw-v${VERSION}-release.apk"

          cp "$DEBUG_SRC"   "$DEBUG_DST"
          cp "$RELEASE_SRC" "$RELEASE_DST"

          echo "debug_apk=$DEBUG_DST"     >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_DST" >> $GITHUB_OUTPUT

          # File sizes (human-friendly) and SHA-256 for verification
          RELEASE_SIZE=$(du -h "$RELEASE_DST" | cut -f1)
          DEBUG_SIZE=$(du -h "$DEBUG_DST" | cut -f1)
          RELEASE_SHA=$(sha256sum "$RELEASE_DST" | cut -d' ' -f1)
          echo "release_size=$RELEASE_SIZE" >> $GITHUB_OUTPUT
          echo "debug_size=$DEBUG_SIZE"     >> $GITHUB_OUTPUT
          echo "release_sha=$RELEASE_SHA"   >> $GITHUB_OUTPUT

          # Signing status label (shown in release notes)
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "sign_status=✅ Signed release" >> $GITHUB_OUTPUT
          else
            echo "sign_status=⚠️ Unsigned — sideload only" >> $GITHUB_OUTPUT
          fi

      # ── 6b. Build human-readable changelog from git log ─────────────────
      #   Pulls commit subjects between the most recent existing v* tag and
      #   HEAD. Step 8 creates the new tag *after* this step, so the latest
      #   pre-existing tag is the previous build — exactly what we want.
      #   Falls back to the last 30 commits if no v* tag exists yet.
      - name: Build changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-creatordate | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            HEADER="### What's new since [${PREV_TAG}](https://github.com/${{ github.repository }}/releases/tag/${PREV_TAG})"
          else
            RANGE="HEAD~30..HEAD"
            HEADER="### Recent changes"
          fi

          # Pull subject lines, drop merge commits + auto bot bumps.
          LOG=$(git log "$RANGE" \
                  --no-merges \
                  --invert-grep --grep='^Merge ' --grep='^chore: bump' \
                  --pretty=format:'- %s' || true)

          if [ -z "$LOG" ]; then
            LOG="- (no user-facing changes since previous build)"
            COUNT=0
          else
            COUNT=$(printf '%s\n' "$LOG" | grep -c '^- ' || echo 0)
          fi

          AUTHORS=$(git log "$RANGE" --no-merges --format='%an' 2>/dev/null | sort -u | grep -c . || echo 0)

          # Pluralisation
          C_S=$([ "$COUNT" -ne 1 ] && echo s || true)
          A_S=$([ "$AUTHORS" -ne 1 ] && echo s || true)

          {
            echo "header<<__END__"
            echo "$HEADER"
            echo "__END__"
            echo "log<<__END__"
            echo "$LOG"
            echo "__END__"
            echo "summary=**${COUNT} commit${C_S} by ${AUTHORS} author${A_S}** since the previous build."
          } >> $GITHUB_OUTPUT

      # ── 7. Upload workflow artifacts (90-day retention) ──────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroClaw-debug-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.debug_apk }}
          retention-days: 90

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroClaw-release-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.release_apk }}
          retention-days: 90

      # ── 8. Create Git tag ─────────────────────────────────────────────────
      - name: Create release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            TAG="${{ github.event.inputs.release_name }}"
          else
            TAG="v${{ steps.version.outputs.version }}-build.${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" || echo "Tag already exists, skipping"
          git push origin "$TAG" || echo "Tag push skipped"

      # ── 9. GitHub Release ─────────────────────────────────────────────────
      #   `generate_release_notes: false` because we generate our own readable
      #   changelog above (the auto-generated one is just a "compare URL" when
      #   commits aren't from labelled PRs).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeroClaw ${{ steps.tag.outputs.tag }}"
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          generate_release_notes: false
          body: |
            ## 🦀 ZeroClaw Android — ${{ steps.tag.outputs.tag }}

            ${{ steps.changelog.outputs.header }}

            ${{ steps.changelog.outputs.log }}

            _${{ steps.changelog.outputs.summary }}_

            ---

            ### 📲 Install on your phone (sideload)

            1. Download **`ZeroClaw-v${{ steps.version.outputs.version }}-release.apk`** from the **Assets** below.
            2. On the device: **Settings → Security → Install unknown apps** → allow for your browser/file manager.
            3. Open the downloaded APK → **Install**.

            > Already have ZeroClaw installed? You can install this APK over the top — your settings, agents, and API keys are preserved.

            ### 📦 Build artifacts

            | File | Size | Purpose |
            |------|------|---------|
            | `ZeroClaw-v${{ steps.version.outputs.version }}-release.apk` | ${{ steps.version.outputs.release_size }} | Main install — what you want |
            | `ZeroClaw-v${{ steps.version.outputs.version }}-debug.apk` | ${{ steps.version.outputs.debug_size }} | Side-by-side debug build (`.debug` app-id), for testing alongside the release |

            **SHA-256 (release APK):** `${{ steps.version.outputs.release_sha }}`

            ### 🔨 Build metadata

            | Field | Value |
            |-------|-------|
            | Version | `${{ steps.version.outputs.version }}` (build #${{ github.run_number }}) |
            | Commit | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
            | Branch | `${{ github.ref_name }}` |
            | Signing | ${{ steps.version.outputs.sign_status }} |
            | Built by | GitHub Actions (`build-and-release.yml`) |
          files: |
            ${{ steps.version.outputs.debug_apk }}
            ${{ steps.version.outputs.release_apk }}

      # ── 10. Play Store upload (DISABLED — configure to enable) ───────────
      # To enable:
      #   1. Create a Google Play service account → download the JSON key
      #   2. Add repo secret: PLAY_SERVICE_ACCOUNT_JSON = (contents of JSON key)
      #   3. Uncomment the step below and set your packageName
      #
      # - name: Upload to Play Store (Internal Testing)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: ai.zeroclaw.android
      #     releaseFiles: ${{ steps.version.outputs.release_apk }}ok check now then
      #     track: internal          # internal | alpha | beta | production
      #     status: draft            # draft | completed
      #     releaseName: ZeroClaw ${{ steps.tag.outputs.tag }}
